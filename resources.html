<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>IBM Bob PPZ - Demo 資源</title>
  <style>
    :root { color-scheme: dark; font-family: "IBM Plex Sans", system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, #001141 0%, #0043ce 52%, #1192e8 100%);
    }
    main { width: min(920px, calc(100% - 40px)); padding: 64px 0; }
    .eyebrow { font-size: 14px; letter-spacing: .18em; color: #a6c8ff; }
    h1 { margin: 16px 0 12px; font-size: clamp(38px, 6vw, 68px); font-weight: 300; line-height: 1.05; }
    p { margin: 0 0 36px; color: #d0e2ff; font-size: 20px; }
    .links { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    a {
      min-height: 170px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      color: #161616;
      background: #fff;
      text-decoration: none;
      border-top: 5px solid #78a9ff;
      transition: transform .18s ease, box-shadow .18s ease;
    }
    a:hover { transform: translateY(-4px); box-shadow: 0 18px 40px rgba(0, 17, 65, .32); }
    .type { font-size: 13px; letter-spacing: .12em; color: #0043ce; }
    .title { font-size: 24px; line-height: 1.25; }
    @media (max-width: 720px) { .links { grid-template-columns: 1fr; } a { min-height: 130px; } }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">IBM BOB + PREMIUM PACKAGE FOR Z</div>
    <h1>Demo 資源</h1>
    <p>簡報與示範素材的快速入口</p>
    <div class="links">
      <a href="index.html">
        <span class="type">PRESENTATION</span>
        <span class="title">開啟合作版簡報</span>
      </a>
      <a href="data-dictionary-demo.mp4" target="_blank" rel="noopener">
        <span class="type">VIDEO</span>
        <span class="title">觀看 Data Dictionary Demo</span>
      </a>
      <a href="BATCH02-對照分析.html" target="_blank" rel="noopener">
        <span class="type">COMPARISON</span>
        <span class="title">開啟 BATCH02 對照分析</span>
      </a>
    </div>
  </main>
</body>
</html>
